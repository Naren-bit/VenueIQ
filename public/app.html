<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google Analytics 4 — VenueIQ Frontend Telemetry -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-VENUEIQ2026"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-VENUEIQ2026', { send_page_view: true });
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
  <meta name="description" content="VenueIQ uses Gemini AI and real-time crowd data to guide stadium fans to the shortest queues, fastest gates, and best exits — at any venue, any event.">
  <meta name="theme-color" content="#07080f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>VenueIQ — Smart Stadium Companion</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    /* RESET & BASE */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg:     #07080f;
      --s1:     #0f1018;
      --s2:     #161720;
      --s3:     #1d1e2c;
      --b1:     rgba(255,255,255,0.07);
      --b2:     rgba(255,255,255,0.13);
      --g:      #39d98a;
      --p:      #7c6af7;
      --w:      #f5a623;
      --r:      #f26464;
      --t:      #eeeef2;
      --m:      #6b6e85;
      --mono:   'Space Mono', monospace;
      --sans:   'DM Sans', sans-serif;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--t);
      font-family: var(--sans);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Accessibility Focus */
    a:focus-visible, button:focus-visible, textarea:focus-visible, input:focus-visible {
      outline: 2px solid var(--p);
      outline-offset: 2px;
    }
    
    /* Reduced Motion */
    @media (prefers-reduced-motion: reduce) {
      .typing span, .live-dot, .zone-card, .msg, .tab::after, .send-btn, .qr, .alert-card {
        animation: none !important;
        transition: none !important;
      }
    }

    
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: none; }
    }

        .demo-btn { margin: 14px 14px 0; padding: 12px 16px; background: rgba(124,106,247,0.08); border: 1px dashed rgba(124,106,247,0.35); border-radius: 12px; color: var(--p); font-size: 12px; font-weight: 500; cursor: pointer; width: calc(100% - 28px); display: flex; align-items: center; justify-content: center; gap: 8px; font-family: var(--sans); transition: background 0.2s, border-color 0.2s; }
    .demo-btn:hover { background: rgba(124,106,247,0.14); border-color: rgba(124,106,247,0.5); }
    .demo-btn:active { transform: scale(0.98); }
    /* APP SHELL */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 480px;
      margin: 0 auto;
      border-left: 1px solid var(--b1);
      border-right: 1px solid var(--b1);
      position: relative;
    }
    @media (max-width: 480px) {
      #app { border: none; }
    }

    /* HEADER */
    .hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--b1);
      background: var(--s1);
      flex-shrink: 0;
    }
    .logo {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.03em;
      text-decoration: none;
      color: var(--t);
    }
    .logo-iq { color: var(--g); }
    .hdr-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .hdr-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-family: var(--mono);
    }
    .hdr-pill-ws   { background: rgba(124,106,247,0.12); border: 1px solid rgba(124,106,247,0.2); color: var(--p); }
    .hdr-pill-live { background: rgba(57,217,138,0.10);  border: 1px solid rgba(57,217,138,0.2);  color: var(--g); }
    .hdr-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .hdr-clock { text-align: right; }
    .hdr-clock-min   { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--t); line-height: 1; }
    .hdr-clock-phase { font-size: 9px; color: var(--m); letter-spacing: 0.06em; text-transform: uppercase; }

    /* TAB BAR */
    .tab-bar {
      display: flex;
      height: 44px;
      border-bottom: 1px solid var(--b1);
      flex-shrink: 0;
      background: transparent;
      position: relative;
    }
    .tab-bar::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: var(--tab-indicator-left, 0);
      width: var(--tab-indicator-width, 20%);
      height: 2px;
      background: var(--g);
      border-radius: 2px 2px 0 0;
      transition: left 0.2s ease, width 0.2s ease;
      transform: translateX(12.5%); /* center the active indicator 50% width inside the tab */
    }
    .tab {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: none;
      border: none;
      color: var(--m);
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      position: relative;
    }
    .tab.active { color: var(--t); }
    .tab-icon { font-size: 13px; }

    /* PANELS */
    .panels {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }
    .panel {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      overflow-x: hidden;
      opacity: 0;
      pointer-events: none;
      display: none;
    }
    .panel.active {
      opacity: 1;
      display: flex;
      flex-direction: column;
      pointer-events: auto;
    }
    .panel::-webkit-scrollbar { width: 4px; }
    .panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }

    /* NOW TAB */
    .now-header { padding: 16px 20px; }
    .section-prompt { margin: 12px 14px 0; background: rgba(124,106,247,0.07); border: 1px solid rgba(124,106,247,0.2); border-radius: 12px; padding: 11px 14px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
    .section-prompt-text { font-size: 12px; color: var(--p); line-height: 1.4; }
    .section-prompt-text small { display: block; font-size: 10px; color: var(--m); margin-top: 2px; }
    .section-set-btn { font-size: 11px; font-weight: 600; color: var(--p); background: rgba(124,106,247,0.15); border: 1px solid rgba(124,106,247,0.3); border-radius: 6px; padding: 5px 10px; cursor: pointer; font-family: var(--sans); white-space: nowrap; flex-shrink: 0; }
    .section-badge { display: flex; align-items: center; gap: 6px; padding: 8px 14px; font-size: 11px; font-family: var(--mono); color: var(--g); cursor: pointer; }
    .section-badge-change { color: var(--m); cursor: pointer; }
    .section-badge-change:hover { color: var(--t); }
    
    .goal-cards { display: flex; flex-direction: column; gap: 12px; padding: 16px 14px 4px; }
    .goal-card { display: flex; align-items: center; gap: 0; background: var(--s2); border: 1px solid var(--b1); border-radius: 14px; overflow: hidden; cursor: pointer; transition: border-color 0.18s, transform 0.12s; min-height: 64px; animation: cardIn 0.3s cubic-bezier(0.22,1,0.36,1) both; }
    .goal-card:nth-child(1) { animation-delay: 0.05s; }
    .goal-card:nth-child(2) { animation-delay: 0.10s; }
    .goal-card:nth-child(3) { animation-delay: 0.15s; }
    .goal-card:hover { border-color: var(--b2); transform: translateY(-1px); }
    .goal-card:active { transform: scale(0.98); }
    .goal-accent { width: 3px; align-self: stretch; flex-shrink: 0; }
    .goal-accent--food { background: var(--g); }
    .goal-accent--exit { background: var(--p); }
    .goal-accent--seat { background: var(--w); }
    .goal-icon { width: 48px; height: 64px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .goal-body { flex: 1; padding: 12px 4px; min-width: 0; }
    .goal-title { font-size: 14px; font-weight: 600; color: var(--t); margin-bottom: 2px; }
    .goal-sub   { font-size: 11px; color: var(--m); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: var(--mono); }
    .goal-stat { padding: 0 10px; text-align: right; flex-shrink: 0; }
    .goal-wait { font-family: var(--mono); font-size: 22px; font-weight: 700; line-height: 1; }
    .goal-unit { font-size: 10px; font-weight: 400; opacity: 0.55; margin-left: 1px; }
    .goal-stat-label { font-size: 9px; color: var(--m); letter-spacing: 0.05em; margin-top: 2px; text-transform: uppercase; font-family: var(--mono); }
    .goal-arrow { font-size: 18px; color: var(--b2); padding-right: 12px; flex-shrink: 0; align-self: center; }

    .stats-strip { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 12px 14px 0; }
    .stat-chip { background: var(--s2); border: 1px solid var(--b1); border-radius: 10px; padding: 9px 8px; text-align: center; }
    .stat-val { font-family: var(--mono); font-size: 16px; font-weight: 700; line-height: 1; }
    .stat-lbl { font-size: 9px; color: var(--m); margin-top: 3px; letter-spacing: 0.05em; text-transform: uppercase; font-family: var(--mono); }

    /* CHAT PANEL */
    .chat-messages {
      flex: 1;
      padding: 16px 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: none; }
    }
    .msg { animation: msgIn 0.22s ease forwards; }
    
    .welcome-card {
      background: linear-gradient(135deg, rgba(57,217,138,0.07), rgba(124,106,247,0.05));
      border: 1px solid rgba(57,217,138,0.14);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 8px;
    }
    .welcome-title { font-family: var(--sans); font-size: 14px; font-weight: 600; margin-bottom: 6px; }
    .welcome-text { font-family: var(--sans); font-size: 12.5px; color: var(--m); font-weight: 400; line-height: 1.5; }
    .welcome-text strong { color: var(--g); font-weight: inherit; }

    .msg-user-wrap { align-self: flex-end; max-width: 82%; display: flex; flex-direction: column; align-items: flex-end; }
    .msg-user {
      background: var(--g);
      color: #07080f;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      border-radius: 18px;
      border-bottom-right-radius: 5px;
      padding: 10px 14px;
      line-height: 1.4;
    }
    .msg-bot-wrap { align-self: flex-start; max-width: 82%; display: flex; flex-direction: column; align-items: flex-start; width: 100%; }
    .msg-bot {
      background: var(--s2);
      border: 1px solid var(--b2);
      color: var(--t);
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 400;
      border-radius: 18px;
      border-bottom-left-radius: 5px;
      padding: 10px 14px;
      line-height: 1.45;
    }
    .msg-bot strong { color: var(--g); font-weight: 600; }
    
    .msg-timestamp { font-family: var(--mono); font-size: 10px; color: var(--m); margin-top: 4px; }
    
    .typing {
      background: var(--s2);
      border: 1px solid var(--b2);
      border-radius: 18px;
      border-bottom-left-radius: 5px;
      padding: 12px 14px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      align-self: flex-start;
      margin-top: 8px;
    }
    .typing span {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--m);
      animation: typingBounce 1.2s ease infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.18s; }
    .typing span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes typingBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    /* INLINE ZONE CARDS (CHAT) */
    .inline-zones {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
      width: 100%;
    }
        .zone-card { background: var(--s2); border: 1px solid var(--b1); border-radius: 12px; overflow: hidden; display: flex; cursor: pointer; animation: cardIn 0.28s cubic-bezier(0.22,1,0.36,1) both; transition: border-color 0.18s; padding: 0; min-height: auto; }
    .zone-card:hover { border-color: var(--b2); }
    .zone-left-accent { width: 3px; flex-shrink: 0; }
    .zone-card-body { flex: 1; padding: 10px 12px 9px; }
    .zone-type-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .zone-icon { font-size: 13px; }
    .zone-type-badge { font-size: 9px; font-family: var(--mono); padding: 2px 6px; border-radius: 4px; letter-spacing: 0.04em; }
    .badge-food { background: rgba(57,217,138,0.10); color: var(--g); }
    .badge-gate { background: rgba(124,106,247,0.12); color: var(--p); }
    .badge-rest { background: rgba(245,166,35,0.10); color: var(--w); }
    .zone-name { font-size: 11px; color: var(--m); margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: var(--sans); }
    .zone-wait-row { display: flex; align-items: baseline; gap: 2px; margin-bottom: 6px; }
    .zone-wait-num { font-family: var(--mono); font-size: 22px; font-weight: 700; line-height: 1; }
    .zone-wait-unit { font-size: 10px; opacity: 0.55; }
    .zone-bar { height: 3px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; }
    .zone-card.updated { animation: zoneFlash 0.6s ease forwards; }
    @keyframes zoneFlash { 0%   { border-color: var(--g); } 100% { border-color: var(--b1); } }

    .zone-card-old {
      background: var(--s3);
      border: 1px solid var(--b1);
      border-radius: 12px;
      padding: 10px 12px;
      cursor: pointer;
      min-height: 68px;
    }
    .zone-card:hover { border-color: var(--b2); }
    @keyframes flash {
      0%   { border-color: var(--g); }
      100% { border-color: var(--b1); }
    }
    .zone-card.flash { animation: flash 0.6s ease; }
    .zone-card-name { font-family: var(--sans); font-size: 11px; color: var(--m); margin-bottom: 2px; }
    .zone-card-wait { font-family: var(--mono); font-size: 20px; font-weight: 700; line-height: 1; margin-bottom: 6px; }
    .zone-card-wait .unit { font-size: 11px; font-weight: 400; opacity: 0.6; }
    .zone-bar-track { height: 3px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden; }
    .zone-bar-fill { height: 100%; border-radius: 2px; transition: width 0.8s ease; }
    .zone-bar--ok   { background: var(--g); }
    .zone-bar--warn { background: var(--w); }
    .zone-bar--bad  { background: var(--r); }
    .zone-card--best { border-color: rgba(57,217,138,0.25); background: rgba(57,217,138,0.04); }
    .zone-card--best::before { content: 'Best option'; display: block; font-size: 9px; font-family: var(--mono); color: var(--g); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 4px; }

    
    .c-ok { color: var(--g); }
    .bg-ok { background: var(--g); }
    .c-warn { color: var(--w); }
    .bg-warn { background: var(--w); }
    .c-danger { color: var(--r); }
    .bg-danger { background: var(--r); }

    /* INLINE SECTION PICKER */
    .section-picker {
      background: var(--s3);
      border: 1px solid var(--b1);
      border-radius: 12px;
      padding: 14px;
      margin-top: 8px;
      width: 100%;
    }
    .sp-title { font-family: var(--mono); font-size: 10px; color: var(--m); text-transform: uppercase; margin-bottom: 12px; }
    .sp-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .sp-label { font-size: 12px; color: var(--t); }
    .sp-btn-group { display: flex; gap: 6px; }
    .sp-btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      background: var(--s3);
      border: 1px solid var(--b1);
      color: var(--t);
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .sp-btn:hover {
      border-color: var(--g);
      background: rgba(57,217,138,0.09);
      color: var(--g);
    }

    /* QUICK REPLIES */
    .quick-replies {
      display: flex; gap: 7px; padding: 6px 14px; overflow-x: auto; flex-shrink: 0; -webkit-overflow-scrolling: touch; scrollbar-width: none;
      -webkit-mask-image: linear-gradient(to right, black 85%, transparent 100%); mask-image: linear-gradient(to right, black 85%, transparent 100%);
    }
    .quick-replies::-webkit-scrollbar { display: none; }
    .qr {
      background: var(--s2);
      border: 1px solid var(--b2);
      border-radius: 20px;
      padding: 7px 14px;
      color: var(--t);
      font-family: var(--sans);
      font-size: 11.5px;
      white-space: nowrap;
      cursor: pointer;
      min-height: 40px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      transition: border-color 0.18s, background 0.18s, color 0.18s;
    }
    .qr:hover {
      border-color: rgba(57,217,138,0.35);
      background: rgba(57,217,138,0.07);
      color: var(--g);
    }

    /* INPUT ROW */
    .chat-input-area {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      padding: 10px 16px calc(20px + var(--safe-bottom));
      border-top: 1px solid var(--b1);
      background: var(--bg);
      flex-shrink: 0;
    }
    .chat-input {
      flex: 1;
      background: var(--s2);
      border: 1px solid var(--b2);
      border-radius: 24px;
      color: var(--t);
      font-family: var(--sans);
      font-size: 13px;
      padding: 12px 16px;
      min-height: 42px;
      max-height: 100px;
      resize: none;
      outline: none;
    }
    .chat-input::placeholder { color: var(--m); }
    .chat-input:focus {
      border-color: var(--p);
      box-shadow: 0 0 0 3px rgba(124,106,247,0.12);
    }
    .send-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--g);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }
    .send-btn:active { transform: scale(0.92); }
    .send-btn svg { fill: #07080f; width: 16px; height: 16px; }

    .camera-btn { width: 38px; height: 38px; border-radius: 10px; background: var(--s3); border: 1px solid var(--b2); color: var(--m); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: border-color 0.18s, color 0.18s; }
    .camera-btn:hover { border-color: var(--p); color: var(--p); }
    .voice-btn { width: 38px; height: 38px; border-radius: 10px; background: var(--s3); border: 1px solid var(--b2); color: var(--m); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.18s; position: relative; }
    .voice-btn:hover { border-color: var(--g); color: var(--g); }
    .voice-btn.listening { background: rgba(57,217,138,0.12); border-color: var(--g); color: var(--g); animation: voicePulse 1s ease-in-out infinite; }
    @keyframes voicePulse { 0%,100% { box-shadow: 0 0 0 0 rgba(57,217,138,0.4); } 50% { box-shadow: 0 0 0 8px rgba(57,217,138,0); } }
    .send-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--g); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: transform 0.12s, opacity 0.15s; }
    .send-btn:hover  { opacity: 0.88; }
    .send-btn:active { transform: scale(0.91); }
    .send-btn svg { fill: #07080f; width: 16px; height: 16px; }

    /* MAP PANEL */
    .map-canvas-wrap {
      flex: 1;
      position: relative;
      background: #12121a;
      width: 100%;
    }
    #venue-map { display: block; width: 100%; height: 100%; }
    .map-legend {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: rgba(7,8,15,0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--b1);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--t); }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

/* TRANSITIONS */
@keyframes slideInRight { from { opacity: 0; transform: translateX(24px); } to { opacity: 1; transform: none; } }

@keyframes slideOutRight { from { opacity: 1; transform: none; } to { opacity: 0; transform: translateX(24px); } }

.panel { display: none; flex: 1; flex-direction: column; overflow-x: hidden; overflow-y: auto; opacity: 1; pointer-events: none; }

@keyframes cardIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

    // Match clock
    let MATCH_START_TIME = Date.now() - (43 * 60 * 1000);
    function getMatchState() {
      const elapsedMs = Date.now() - MATCH_START_TIME;
      const minute = Math.floor(elapsedMs / 60000);
      if (minute < 0)  return { minute: 0,  phase: 'pre' };
      if (minute < 45) return { minute,     phase: 'first' };
      if (minute < 47) return { minute: 45, phase: 'halftime' };
      if (minute < 90) return { minute: minute - 2, phase: 'second' };
      return { minute: 90, phase: 'fulltime' };
    }
    
    function showPhaseBanner(message, type) {
      const existing = document.getElementById('phase-banner');
      if (existing) return;
      const banner = document.createElement('div');
      banner.id = 'phase-banner';
      banner.className = `phase-banner phase-banner--${type}`;
      banner.innerHTML = `<span>${message}</span><button onclick="this.parentElement.remove()" aria-label="Dismiss">×</button>`;
      document.getElementById('app').insertBefore(banner, document.getElementById('tab-bar'));
      setTimeout(() => banner.remove(), 12000);
    }
    function startMatchClock() {
      function update() {
        const { minute, phase } = getMatchState();
        const clockEl = document.getElementById('match-clock');
        const phaseEl = document.getElementById('match-phase');
        const nowClockEl = document.getElementById('now-clock');
        if (clockEl) clockEl.textContent = `${minute}'`;
        if (phaseEl) {
          const labels = { pre: 'Pre-match', first: '1st Half', halftime: 'Half Time', second: '2nd Half', fulltime: 'Full Time' };
          phaseEl.textContent = labels[phase] || '';
        }
        if (phase === 'halftime' && minute === 45) showPhaseBanner('⏱ Halftime — food courts filling fast. Head to West Food now.', 'warn');
        if (minute >= 82 && minute < 85 && phase === 'second') showPhaseBanner('🚶 Plan your exit. Section A–C: leave at 85th min via Gate N.', 'info');
        if (nowClockEl) {
          nowClockEl.innerHTML = `
            <div class="clock-badge phase-${phase}">
              <span class="clock-min">${minute}'</span>
              <span class="clock-phase">${phase === 'halftime' ? 'HALF TIME' : phase === 'first' ? '1ST HALF' : phase === 'second' ? '2ND HALF' : phase.toUpperCase()}</span>
            </div>`;
        }
      }
      update();
      setInterval(update, 1000);
    }

    // Sparkline func
    const zoneHistory = {};
    function drawSparkline(canvas, values, color) {
      if (!canvas || values.length < 2) return;
      const ctx = canvas.getContext('2d');
      const W = canvas.width = canvas.offsetWidth * window.devicePixelRatio;
      const H = canvas.height = canvas.offsetHeight * window.devicePixelRatio;
      ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
      const w = canvas.offsetWidth, h = canvas.offsetHeight;
      ctx.clearRect(0, 0, w, h);
      const min = Math.min(...values);
      const max = Math.max(...values) || 1;
      const pad = 3;
      const xStep = (w - pad * 2) / (values.length - 1);
      const grad = ctx.createLinearGradient(0, 0, 0, h);
      const c = color.startsWith('#') ? 'rgba('+parseInt(color.slice(1,3),16)+','+parseInt(color.slice(3,5),16)+','+parseInt(color.slice(5,7),16) : color.replace(')', '');
      const rgbaStr = (c.startsWith('rgba') ? c.replace(/,[\d\.]+\)$/, '') : c);
      grad.addColorStop(0, `${rgbaStr},0.25)`);
      grad.addColorStop(1, `${rgbaStr},0)`);
      ctx.beginPath();
      values.forEach((v, i) => { const x = pad + i * xStep; const y = h - pad - ((v - min) / (max - min || 1)) * (h - pad * 2); i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); });
      ctx.lineTo(pad + (values.length - 1) * xStep, h); ctx.lineTo(pad, h); ctx.closePath();
      ctx.fillStyle = grad; ctx.fill();
      ctx.beginPath();
      values.forEach((v, i) => { const x = pad + i * xStep; const y = h - pad - ((v - min) / (max - min || 1)) * (h - pad * 2); i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); });
      ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.lineJoin = 'round'; ctx.lineCap = 'round'; ctx.stroke();
      const lastX = pad + (values.length - 1) * xStep; const lastV = values[values.length - 1]; const lastY = h - pad - ((lastV - min) / (max - min || 1)) * (h - pad * 2);
      ctx.beginPath(); ctx.arc(lastX, lastY, 2.5, 0, Math.PI * 2); ctx.fillStyle = color; ctx.fill();
    }

    function animateNumber(el, target, duration = 600) {
      const start = parseInt(el.textContent) || 0;
      if (start === target) return;
      const startTime = performance.now();
      function update(now) {
        const progress = Math.min((now - startTime) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        el.textContent = Math.round(start + (target - start) * eased);
        if (progress < 1) requestAnimationFrame(update);
      }
      requestAnimationFrame(update);
    }

    // SIMULATION

    let socket = null;
    function initSocket() {
      try {
        socket = io(BACKEND_URL, {
          transports: ['websocket', 'polling'],
          reconnectionAttempts: 5,
          reconnectionDelay: 2000,
          timeout: 5000
        });

        socket.on('connect', () => {
          wsConnected = true;
          wsIndicator.innerHTML = 'WS &bull;';
          wsIndicator.style.color = 'var(--accent)';
          statusText.textContent = 'LIVE';
        });

        socket.on('disconnect', () => {
          wsConnected = false;
          wsIndicator.textContent = 'WS ○';
          wsIndicator.style.color = 'var(--muted)';
        });

        socket.on('zones:updated', (updatedZones) => {
          updatedZones.forEach(z => { if(!zoneHistory[z.id]) zoneHistory[z.id]=[]; zoneHistory[z.id].push(z.capacity); if(zoneHistory[z.id].length>10) zoneHistory[z.id].shift(); });
          currentZones = updatedZones;
          renderZoneGrid(currentZones, document.getElementById('map-zone-cards'));
          renderNowTab(currentZones, getSection(), currentForecasts);
          if (activeTab === 'map') drawMap(currentZones);
          flashZones();
        });

        socket.on('alert:new', (alert) => {
          alertsData.unshift(alert);
          renderAlerts(alertsData);
        });
      } catch (err) {}
    }

    async function loadInitialData() {
      try {
        const res = await fetch(`${BACKEND_URL}/api/zones`);
        if (res.ok) {
          const data = await res.json();

        statusText.textContent = 'DEMO';

      try {
        const res = await fetch(`${BACKEND_URL}/api/alerts`);
        if (res.ok) {
          const data = await res.json();
          if (data.alerts.length > 0) alertsData = data.alerts;
        }
      } catch {}

      renderAlerts(alertsData);

      try {
        const fRes = await fetch(`${BACKEND_URL}/api/zones/forecast`);
        if (fRes.ok) {
          const fData = await fRes.json();
          currentForecasts = Object.fromEntries(fData.zones.map(z => [z.id, z.forecast]));
        }
      } catch {}

      renderNowTab(currentZones, getSection(), currentForecasts);
    }

    
    const TAB_ORDER = ['now', 'chat', 'map', 'alerts', 'group'];
    let currentTabIndex = 0;
    function switchTab(tab) {
      const btn = document.querySelector(`.tab[data-tab="${tab}"]`);
      if (btn) {
        const newIndex = TAB_ORDER.indexOf(tab);
        const direction = newIndex > currentTabIndex ? 'left' : 'right';
        const currentView = document.querySelector('.panel.active');
        if (currentView) {
          currentView.classList.remove('active');
          currentView.classList.add(`exiting-${direction}`);
          setTimeout(() => currentView.classList.remove(`exiting-${direction}`), 200);
        }

        activeTab = tab;
        document.querySelectorAll('.tab').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected', 'false'); });
        btn.classList.add('active'); btn.setAttribute('aria-selected', 'true');
        
        const idx = [...tabBar.querySelectorAll('.tab')].indexOf(btn);
        const totalTabs = tabBar.querySelectorAll('.tab').length;
        tabBar.style.setProperty('--tab-indicator-left', `${(idx / totalTabs) * 100}%`);
        tabBar.style.setProperty('--tab-indicator-width', `${(100 / totalTabs) * 0.75}%`);
        
        const newView = document.getElementById(`view-${tab}`);
        newView.style.setProperty('--slide-dir', direction === 'left' ? '24px' : '-24px');
        newView.classList.add('active');

        currentTabIndex = newIndex;
        if (tab === 'map') setTimeout(() => drawMap(currentZones, 0), 50);
      }
    }


    // Keydown for tab bar (Accessibility)
    tabBar.addEventListener('keydown', (e) => {
      const tabs = [...tabBar.querySelectorAll('.tab')];
      const idx = tabs.indexOf(document.activeElement);
      if (idx > -1) {
        let nextIdx = idx;
        if (e.key === 'ArrowRight') nextIdx = (idx + 1) % tabs.length;
        if (e.key === 'ArrowLeft') nextIdx = (idx - 1 + tabs.length) % tabs.length;
        if (nextIdx !== idx) {
          tabs[nextIdx].focus();
          switchTab(tabs[nextIdx].dataset.tab);
        }
      }
    });

        function getCssColorVar(wait) {

      if (wait <= WAIT_THRESHOLDS.warn) return 'var(--w)';
      return 'var(--r)';
    }
    function getCssColorClass(wait) {
      if (wait <= WAIT_THRESHOLDS.ok) return 'c-ok';
      if (wait <= WAIT_THRESHOLDS.warn) return 'c-warn';
      return 'c-danger';
    }
    function getBgColorClass(wait) {
      if (wait <= WAIT_THRESHOLDS.ok) return 'bg-ok';

      return 'bg-danger';

            <div class="sp-row"><span class="sp-label">West stand</span><div class="sp-btn-group"><div class="sp-btn" onclick="setSection('G')">G</div><div class="sp-btn" onclick="setSection('H')">H</div><div class="sp-btn" onclick="setSection('I')">I</div></div></div>
            <div class="sp-row"><span class="sp-label">South stand</span><div class="sp-btn-group"><div class="sp-btn" onclick="setSection('J')">J</div><div class="sp-btn" onclick="setSection('K')">K</div><div class="sp-btn" onclick="setSection('L')">L</div></div></div>
          </div>
        `;
        document.getElementById('stats-strip').style.display = 'none';
        if (locContainer) locContainer.innerHTML = ''; // Hide prompt when picking section
        return;
      }

      if (window.tempIntent) {
        const intent = window.tempIntent;
        window.tempIntent = null;
        switchTab('chat');
        if (intent === 'food') chatInput.value = `Where is the shortest food queue from section ${section || 'my section'}?`;
        else if (intent === 'exit') chatInput.value = `What is the best way out from section ${section || 'my section'}?`;
        else if (intent === 'seat') chatInput.value = `How do I get to my seat in section ${section || 'my section'}?`;
        else if (intent === 'restroom') chatInput.value = `Where is the nearest restroom from section ${section || 'my section'}?`;
        setTimeout(handleSend, 100);
      }

      const byWait = type => zones.filter(z => z.type === type).sort((a,b)=>a.wait-b.wait);
      const bestFood = byWait('food')[0];
      const bestGate = byWait('gate')[0];
      const avgWait = Math.round(zones.reduce((s,z) => s+z.wait, 0) / zones.length);

      document.getElementById('stats-strip').style.display = 'grid';

    function fallbackRouting(text) {
      const l = text.toLowerCase();
      let best = null;
      let reply = "I can help you find the shortest queues.";
      let zList = [];
      let askedForSection = false;

      if(l.match(/parks?|parking|cars?|vehicles?|lots?|drives?|ubers?|taxis?|rides?/)) {
        return { reply: "Post-game: head to **Lot A or D** — space available. Lot C is nearly full. Leave 10 min before the final whistle to beat the rush. 🚗", zones: [], askedForSection: false };
      }
      if(l.match(/seats?|sections?|rows?|blocks?|finds?|where am i/)) {
        return { reply: "Match your section letter to the nearest gate: **A–C → North**, **D–F → East**, **G–J → South**. Check signage at any concourse entry. 📍", zones: [], askedForSection: false };
      }
      if(l.match(/busy|crowd|crowds|packed|full|congestion|capacity|overview/)) {
        const sorted = [...currentZones].sort((a, b) => b.capacity - a.capacity);
        return { reply: `Most congested: **${sorted[0].name}** at ${Math.round(sorted[0].capacity * 100)}%. Quietest: **${sorted[sorted.length - 1].name}** at ${Math.round(sorted[sorted.length - 1].capacity * 100)}%. 📊`, zones: [], askedForSection: false };
      }
      if(l.match(/help|what can you|how do|menus?|options?/)) {
        return { reply: "I can help with: **food queue** wait times, **gate** congestion, **restroom** locations, **parking** tips, and **seat finding**. Just ask! 🎯", zones: [], askedForSection: false };
      }

      if(l.match(/food|hungry|burger|pizza|snack|eat/)) best = currentZones.filter(z=>z.type==='food').sort((a,b)=>a.wait-b.wait)[0];
      else if(l.match(/gate|entry|exit|way out|leave|door/)) best = currentZones.filter(z=>z.type==='gate').sort((a,b)=>a.wait-b.wait)[0];
      else if(l.match(/restroom|toilet|bathroom|loo|wc|washroom/)) best = currentZones.filter(z=>z.type==='restroom').sort((a,b)=>a.wait-b.wait)[0];
      
      if(best) {
        if(!getSection()) {
          reply = `Globally, **${best.name}** has the shortest wait (${best.wait} min). To give you the nearest option, what section are you standing in?`;
          askedForSection = true;
        } else {
          reply = `From Section ${getSection()}, **${best.name}** is your best option.`;
          zList = [best];
        }
      }
      return { reply, zones: zList, askedForSection };
    }

    async function handleSend() {
      const text = chatInput.value.trim();
      if (!text || isThinking) return;

      chatInput.value = ''; chatInput.style.height = '42px';
      isThinking = true; sendBtn.disabled = true;

      addMessage(text, 'user');
      conversationHistory.push({ role: 'user', text });
      showTyping();

      let rObj = { reply: '', zones: [], askedForSection: false };
      try {
        const res = await fetch(`${BACKEND_URL}/api/chat`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history: conversationHistory, section: userSection })
        });
        if(res.ok) rObj = await res.json();
        else throw new Error("API fail");
      } catch {
        rObj = fallbackRouting(text);
      }

      hideTyping();
      addMessage(rObj.reply, 'bot');
      conversationHistory.push({ role: 'model', text: rObj.reply });
      if (window.voiceTriggered || window.preferVoice) { speakResponse(rObj.reply); window.voiceTriggered = false; }

      const lastWrap = chatMessages.lastElementChild;
      if (rObj.zones && rObj.zones.length > 0) {
        renderZoneCards(rObj.zones.slice(0,4), lastWrap);
      }
      if (rObj.askedForSection) {
        appendSectionPicker(lastWrap);
      }

      isThinking = false; sendBtn.disabled = false;
      chatInput.focus();
    }

    // ALERTS
    function getAlertClass(alert) {
      if (alert.source === 'exit-coordinator' || alert.type === 'exit') return 'exit-alert';
      if (alert.urgency === 'urgent' && alert.source !== 'gemini') return 'critical';
      if (alert.urgency === 'urgent' || alert.type === 'urgent') return 'critical';
      if (alert.source === 'halftime-predictor' || alert.source === 'gemini' || alert.type === 'info') return 'info-alert';
      return 'routine';
    }

    function getAlertSource(alert) {
      if (alert.source === 'gemini') return 'GEMINI · AUTO-DETECTED';
      if (alert.source === 'operator') return 'OPS CENTRE · BROADCAST';
      if (alert.source === 'halftime-predictor') return 'GEMINI · PREDICTED';
      if (alert.source === 'exit-coordinator') return 'OPS CENTRE · BROADCAST';
      return 'SYSTEM';
    }

    function renderAlerts(alerts) {
      if(!alerts.length) {
        alertsList.innerHTML = `<div class="empty-state">No active alerts.</div>`;
        return;
      }
      
      const now = Date.now();
      const active = alerts.filter(a => (now - (a.timestamp||a.time||now)) < 30 * 60000);
      const earlier = alerts.filter(a => (now - (a.timestamp||a.time||now)) >= 30 * 60000);

      let html_alerts = '';
      
      function renderGroup(group) {
        return group.map(a => {
          const cls = getAlertClass(a);
          const diff = Math.round((now - (a.timestamp||a.time||now)) / 60000);
          let ts = diff < 1 ? 'just now' : diff < 60 ? `${diff}m ago` : `${Math.round(diff/60)}h ago`;
          const source = getAlertSource(a);
          
          let defaultDetails = 'To avoid the crowds, we recommend using the alternative routing provided in the Map tab. The ops center is currently monitoring the situation.';
          if (a.title && a.title.toLowerCase().includes('exit')) defaultDetails = 'Please follow the dynamic signage. Gates A and B are being prioritized for upper tier sections. VIPs may use Gate C as usual.';
          else if (a.title && a.title.toLowerCase().includes('halftime')) defaultDetails = 'Concourse congestion is reaching peak levels. Consider ordering food to your seat via the app, or waiting until the 55th minute when queues typically drop by 60%.';
          else if (a.title && a.title.toLowerCase().includes('rain')) defaultDetails = 'Umbrellas are not permitted in the seating bowl. Please utilize the covered concourses on Level 2 and Level 3.';
          else if (a.type === 'urgent') defaultDetails = 'This is an urgent operational alert. Follow instructions from stadium stewards. Do not attempt to bypass cordons.';
          
          const detailsText = a.details || defaultDetails;
          
          return `
            <div class="alert-card ${cls} ${diff < 1 ? 'new-alert' : ''}" role="alert">
              <div class="alert-stripe"></div>
              <div class="alert-content">
                <div class="alert-top">
                  <div class="alert-icon-wrap">${a.icon||'ℹ️'}</div>
                  <div class="alert-title-col">
                    <div class="alert-title">${escapeHtml(a.title)}</div>
                    <div class="alert-source">${source}</div>
                  </div>
                  <div class="alert-time">${ts}</div>
                </div>
                <div class="alert-body">${escapeHtml(a.body)}</div>
                ${(cls === 'critical' || cls === 'exit-alert') ? `<button class="alert-action" onclick="this.nextElementSibling.style.display='block'; this.style.display='none';">View details</button><div class="alert-details" style="display: none; margin-top: 10px; font-size: 12px; color: var(--m); padding-top: 10px; border-top: 1px dashed var(--b2); line-height: 1.4;">${escapeHtml(detailsText)}</div>` : ''}
              </div>
            </div>
          `;
        }).join('');
      }

      if (active.length) {
        html_alerts += `<div class="alerts-section-title">🔴 Active now</div>` + renderGroup(active);
      }
      if (earlier.length) {
        html_alerts += `<div class="alerts-section-title">📋 Earlier</div>` + renderGroup(earlier);
      }
      alertsList.innerHTML = html_alerts;
    }

    // MAP
    let pulsePhase = 0;
    function drawMap(zones, manualPhase) {
      if (manualPhase !== undefined) pulsePhase = manualPhase;
      pulsePhase = (pulsePhase + 0.02) % (Math.PI * 2);
      const c = document.getElementById('venue-map');
      if(!c) return;
      const ctx = c.getContext('2d');
      const p = c.parentElement;
      const w = p.clientWidth; const h = Math.max(p.clientHeight, 300);
      c.width = w; c.height = h;
      
      const cx = w/2, cy = h/2;
      ctx.clearRect(0,0,w,h);
      
      // grid
      ctx.strokeStyle = 'rgba(255,255,255,0.02)';
      for(let x=0;x<w;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
      for(let y=0;y<h;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}

      const rx = w*0.3, ry = h*0.35;
      
      ctx.beginPath(); ctx.ellipse(cx,cy,rx*1.2,ry*1.2,0,0,Math.PI*2);
      ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth=10; ctx.stroke();
      
      ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
      ctx.fillStyle = '#0f1018'; ctx.fill();
      ctx.strokeStyle = 'rgba(57,217,138,0.2)'; ctx.lineWidth=1; ctx.stroke();

      // Zones
      const pos = {
        'north-gate':{x:cx,y:cy-h*0.15},'south-gate':{x:cx,y:cy+h*0.15},
        'east-food':{x:cx+w*0.3,y:cy},'west-food':{x:cx-w*0.3,y:cy},
        'north-rest':{x:cx+w*0.2,y:cy-h*0.3},'south-rest':{x:cx-w*0.2,y:cy+h*0.3},
        'vip-entry':{x:cx+w*0.2,y:cy+h*0.3},'main-bar':{x:cx-w*0.2,y:cy-h*0.3}
      };
      
      zones.forEach(z => {
        const p = pos[z.id] || {x:cx,y:cy};
        const r = h*(0.08+z.capacity*0.06);
        let col = z.wait<=5 ? [57,217,138] : z.wait<=15 ? [245,166,35] : [242,100,100];
        
        const grad = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,r);
        grad.addColorStop(0, `rgba(${col[0]},${col[1]},${col[2]},0.4)`);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2);
        ctx.fillStyle = grad; ctx.fill();
        
        ctx.fillStyle = `rgba(${col[0]},${col[1]},${col[2]},1)`;
        ctx.font = "700 11px 'Space Mono'"; ctx.textAlign='center';
        ctx.fillText(z.wait+'m', p.x, p.y+4);
        if (z.capacity > 0.6) { const pRad = r + 8 + Math.sin(pulsePhase)*6; ctx.beginPath(); ctx.arc(p.x, p.y, pRad, 0, Math.PI*2); ctx.strokeStyle=`rgba(${col[0]},${col[1]},${col[2]},${0.15+Math.sin(pulsePhase)*0.1})`; ctx.stroke(); }
      });
    }

    window.addEventListener('resize', () => { if(activeTab==='map') drawMap(currentZones, 0); });
    function mapLoop(){ if(activeTab==='map') drawMap(currentZones); requestAnimationFrame(mapLoop); } requestAnimationFrame(mapLoop);

    (async function boot() {

    // Voice setup
    let recognition = null;
    let synthesis = window.speechSynthesis;
    let preferVoice = false;
    let isSpeaking = false;
    function initVoice() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) return;
      recognition = new SpeechRecognition();
      recognition.continuous = false; recognition.interimResults = true; recognition.lang = 'en-US';
      recognition.onstart = () => { document.getElementById('voice-btn')?.classList.add('listening'); showVoiceOverlay(); };
      recognition.onresult = (event) => {
        const transcript = Array.from(event.results).map(r => r[0].transcript).join('');
        const interimEl = document.getElementById('voice-interim'); if (interimEl) interimEl.textContent = transcript;
        if (event.results[event.results.length - 1].isFinal) { document.getElementById('chat-input').value = transcript; document.getElementById('chat-input').style.height = 'auto'; }
      };
      recognition.onend = () => {
        document.getElementById('voice-btn')?.classList.remove('listening'); hideVoiceOverlay();
        const input = document.getElementById('chat-input');
        if (input.value.trim()) { window.voiceTriggered = true; handleSend(); }
      };
      recognition.onerror = () => { document.getElementById('voice-btn')?.classList.remove('listening'); hideVoiceOverlay(); };
    }
    let voiceActive = false;
    function startVoice() {
      if (!recognition) return;
      synthesis.cancel();
      try { recognition.start(); voiceActive = true; } catch(e) {}
    }
    function stopVoice() {
      if (!recognition || !voiceActive) return;
      try { recognition.stop(); voiceActive = false; } catch(e) {}
    }
    function showVoiceOverlay() {
      const overlay = document.createElement('div'); overlay.id = 'voice-overlay'; overlay.className = 'voice-overlay'; overlay.style.position = 'absolute'; overlay.style.zIndex='100'; overlay.innerHTML = `<div class="voice-wave"><span></span><span></span><span></span><span></span><span></span></div><div id="voice-interim" style="font-size:13px;color:var(--muted);margin-top:8px;min-height:20px">Listening...</div><div style="font-size:11px;color:var(--muted);margin-top:4px">Speak now — release to send</div>`;
      document.querySelector('.panel.active')?.appendChild(overlay);
    }
    function hideVoiceOverlay() { document.getElementById('voice-overlay')?.remove(); }
    window.speakResponse = function speakResponse(text) {
      if (!synthesis || !preferVoice) return;
      synthesis.cancel();
      const clean = text.replace(/\*\*(.*?)\*\*/g, '$1').replace(/[*_`]/g, '');
      const utterance = new SpeechSynthesisUtterance(clean);
      utterance.rate = 1.05; utterance.pitch = 1.0; utterance.volume = 0.9;
      utterance.onstart = () => { document.getElementById('voice-btn')?.classList.add('speaking'); isSpeaking = true; };
      utterance.onend = () => { document.getElementById('voice-btn')?.classList.remove('speaking'); isSpeaking = false; };
      synthesis.speak(utterance);
    }
    function addVoiceToggle() {
      const hdrRight = document.querySelector('.header-right');
      if (!hdrRight) return;
      const toggle = document.createElement('button'); toggle.id = 'voice-toggle'; toggle.className = 'ws-pill pill'; toggle.style.cursor = 'pointer'; toggle.innerHTML = '🔇 Voice';
      toggle.onclick = () => { preferVoice = !preferVoice; toggle.innerHTML = preferVoice ? '🔊 Voice' : '🔇 Voice'; if(preferVoice) speakResponse('Voice responses enabled.'); };
      hdrRight.insertBefore(toggle, hdrRight.firstChild);
    }
    initVoice();
    startMatchClock();
    addVoiceToggle();
    })();

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});

    // ============================================================
    // CAMERA — Multimodal Vision (Gemini image analysis)
    // ============================================================
    document.getElementById('camera-btn').addEventListener('click', function() {
      document.getElementById('camera-file').click();
    });

    document.getElementById('camera-file').addEventListener('change', function(e) {
      var file = e.target.files[0];
      if (!file) return;
      var btn = document.getElementById('camera-btn');
      btn.classList.add('processing');

      var reader = new FileReader();
      reader.onload = function() {
        var base64 = reader.result.split(',')[1];
        var mime = file.type || 'image/jpeg';

        // Switch to Assistant tab and show status
        switchTab('chat');
        var chatLog = document.getElementById('chat-messages');
        var userMsg = document.createElement('div');
        userMsg.className = 'msg user';
        userMsg.innerHTML = '<div class="msg-bubble user-bubble">📷 Analyzing photo for crowd density...</div><div class="msg-time">' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) + '</div>';
        chatLog.appendChild(userMsg);
        chatLog.scrollTop = chatLog.scrollHeight;

        fetch(BACKEND_URL + '/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: { data: base64, mimeType: mime, zoneId: null }, section: window.userSection || null })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var botMsg = document.createElement('div');
          botMsg.className = 'msg bot-wrap';
          var html = '<div class="msg-bot">' + data.reply;
          if (data.visionData && data.visionData.estimatedWait) {
             const vd = data.visionData;
             const color = vd.estimatedCapacity < 0.4 ? 'var(--accent)' : vd.estimatedCapacity < 0.7 ? 'var(--warn)' : 'var(--danger)';
             html += `<div class="vision-result" role="status"><div class="vision-row"><div class="vision-stat" style="flex:1"><div class="vision-label">People spotted</div><div class="vision-val" style="color:${color}">${vd.crowdCount || '~'}</div></div><div class="vision-stat" style="flex:1"><div class="vision-label">Est. wait</div><div class="vision-val" style="color:${color}">${vd.estimatedWait}m</div></div><div class="vision-stat"><div class="vision-label">Confidence</div><div class="vision-val" style="color:var(--muted);font-size:13px">${vd.confidence}</div></div></div><div class="vision-bar"><div class="vision-bar-fill" style="width:${Math.round((vd.estimatedCapacity||0)*100)}%;background:${color}"></div></div></div>`;
          }
          html += '</div>';
          botMsg.innerHTML = html;
          chatLog.appendChild(botMsg);
          chatLog.scrollTop = chatLog.scrollHeight;
          if (window.preferVoice) speakResponse(data.reply);
        })
        .catch(function() {
          var errMsg = document.createElement('div');
          errMsg.className = 'msg bot';
          errMsg.innerHTML = '<div class="msg-bubble bot-bubble">📷 Could not analyze the photo right now. Try a text question instead.</div>';
          chatLog.appendChild(errMsg);
        })
        .finally(function() { btn.classList.remove('processing'); });
      };
      reader.readAsDataURL(file);
      e.target.value = '';
    });

  </script>
</body>
</html>
