# Google Cloud Build — CI/CD Pipeline for VenueIQ
# Triggers on push to main branch
# 1. Installs dependencies
# 2. Runs Jest test suite
# 3. Builds Docker image
# 4. Deploys to Cloud Run

steps:
  # Step 1: Install dependencies
  - name: 'node:18-alpine'
    entrypoint: 'sh'
    args:
      - '-c'
      - 'cd venueiq-backend && npm ci'
    id: 'install'

  # Step 2: Run tests
  - name: 'node:18-alpine'
    entrypoint: 'sh'
    args:
      - '-c'
      - 'cd venueiq-backend && npm test'
    id: 'test'
    waitFor: ['install']

  # Step 3: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/venueiq-backend:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/venueiq-backend:latest'
      - '.'
    id: 'build'
    waitFor: ['test']

  # Step 4: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/venueiq-backend:$SHORT_SHA'
    id: 'push'
    waitFor: ['build']

  # Step 5: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'venueiq-backend'
      - '--image=gcr.io/$PROJECT_ID/venueiq-backend:$SHORT_SHA'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--session-affinity'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
    id: 'deploy'
    waitFor: ['push']

images:
  - 'gcr.io/$PROJECT_ID/venueiq-backend:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/venueiq-backend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
